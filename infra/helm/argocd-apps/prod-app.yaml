apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: usb-control-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/your-org/usb-control"
    targetRevision: main
    path: infra/helm/backend
  destination:
    server: https://kubernetes.default.svc
    namespace: usb-prod
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
