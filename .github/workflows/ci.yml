name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: zricethezav/gitleaks-action@v4
        with:
          config_path: .gitleaks.toml

  dependency-check:
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - name: Run OWASP Dependency-Check
        run: |
          docker run --rm -v ${{ github.workspace }}:/src owasp/dependency-check:latest --project "USB Control" --scan /src/backend/requirements.txt --scan /src/frontend/package.json --format ALL

  sonar:
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - uses: actions/checkout@v4
      - name: SonarQube Scan
        uses: sonarsource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.projectKey=usb-control
            -Dsonar.organization=your-org
            -Dsonar.sources=backend,frontend
            -Dsonar.python.version=3.12

  tests:
    runs-on: ubuntu-latest
    needs: sonar
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: usb_control
          MYSQL_USER: user
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: >
          --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: pytest backend/tests
      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Install frontend deps
        run: |
          cd frontend
          npm install
      - name: Run frontend tests
        run: |
          cd frontend
          npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t usb-control-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t usb-control-frontend:ci ./frontend
      - name: Scan images with Trivy
        run: |
          docker run --rm aquasec/trivy image --exit-code 1 --severity CRITICAL usb-control-backend:ci
          docker run --rm aquasec/trivy image --exit-code 1 --severity CRITICAL usb-control-frontend:ci

  push-ecr:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
      - name: Tag images
        run: |
          docker tag usb-control-backend:ci ${{ secrets.ECR_REGISTRY }}/usb-control-backend:latest
          docker tag usb-control-frontend:ci ${{ secrets.ECR_REGISTRY }}/usb-control-frontend:latest
      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/usb-control-backend:latest
          docker push ${{ secrets.ECR_REGISTRY }}/usb-control-frontend:latest
      - name: Update Helm values
        env:
          UPDATE_SCRIPT: |
            import yaml
            for path, key in [("infra/helm/backend/values-dev.yaml","backend"),("infra/helm/frontend/values-dev.yaml","frontend")]:
                with open(path) as f: data=yaml.safe_load(f)
                image=data["image"]
                image["repository"]="${{ secrets.ECR_REGISTRY }}/usb-control-{}".format(key)
                image["tag"]="latest"
                with open(path, "w") as f: yaml.safe_dump(data, f)
        run: printf '%s\n' "$UPDATE_SCRIPT" | python3
      - name: Commit Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add infra/helm/backend/values-dev.yaml infra/helm/frontend/values-dev.yaml
          git commit -m "ci: update dev helm image tags"
          git push

  deploy:
    runs-on: ubuntu-latest
    needs: push-ecr
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx.conf"
          target: "~/usb-control"

      - name: Deploy containers on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,ECR_REGISTRY
          script: |
            set -e
            cd ~/usb-control

            # Authenticate with ECR using temporary env-var credentials (not persisted)
            AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID" \
            AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY" \
            AWS_DEFAULT_REGION=us-east-1 \
            aws ecr get-login-password --region us-east-1 \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # Pull pre-built images and restart with production overrides
            ECR_REGISTRY="$ECR_REGISTRY" docker-compose \
              -f docker-compose.yml -f docker-compose.prod.yml pull

            ECR_REGISTRY="$ECR_REGISTRY" docker-compose \
              -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            docker image prune -f
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
