name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to AWS Instance
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/usbdevicecontrol || mkdir -p /home/ubuntu/usbdevicecontrol && cd /home/ubuntu/usbdevicecontrol
            
            # Initialize git if not already done
            if [ ! -d .git ]; then
              git clone https://github.com/write2prakash/usbdevicecontrol.git .
            fi
            
            # Pull latest changes
            git fetch origin
            git reset --hard origin/main
            
            # Pull Docker images and restart services
            docker-compose down || true
            docker-compose pull
            docker-compose up -d
            
            echo "Deployment completed successfully!"
