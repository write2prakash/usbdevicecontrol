name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package deployment files
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*.db' \
            --exclude='deploy.tar.gz' \
            -czf deploy.tar.gz .

      - name: Upload deployment package to AWS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Extract and deploy on AWS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: 22
          envs: JWT_SECRET,SERVER_HOST
          command_timeout: 20m
          script: |
            set -e

            # Install docker compose plugin if missing
            if ! docker compose version &>/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y docker-compose-plugin
            fi

            APP_DIR=/home/ubuntu/usbdevicecontrol
            mkdir -p "$APP_DIR"
            rm -rf "$APP_DIR"/*
            tar -xzf /home/ubuntu/deploy.tar.gz -C "$APP_DIR"
            cd "$APP_DIR"

            # Write env files every deploy so they stay in sync
            cat > backend/.env << ENVEOF
            DATABASE_URL=sqlite:///./usb_control.db
            JWT_SECRET=${JWT_SECRET}
            BACKEND_CORS_ORIGINS=http://${SERVER_HOST},http://localhost:3000
            ENVEOF

            cat > frontend/.env.local << ENVEOF
            NEXT_PUBLIC_API_URL=http://${SERVER_HOST}/api
            ENVEOF

            # Build and start using prod overrides (strips --reload / npm run dev)
            NEXT_PUBLIC_API_URL="http://${SERVER_HOST}/api" \
              sudo docker compose \
                -f docker-compose.yml \
                -f docker-compose.prod.yml \
                up -d --build --remove-orphans

            sudo docker image prune -f
            echo "Deployment complete!"
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SERVER_HOST: ${{ secrets.AWS_HOST }}
