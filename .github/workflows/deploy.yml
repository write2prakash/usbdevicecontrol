name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package deployment files
        run: |
          tar --exclude='.git' --exclude='.github' --exclude='deploy.tar.gz' -czf deploy.tar.gz .

      - name: Upload deployment package to AWS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "/home/ubuntu"

      - name: Extract and deploy on AWS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            mkdir -p /home/ubuntu/usbdevicecontrol
            rm -rf /home/ubuntu/usbdevicecontrol/*
            tar -xzf /home/ubuntu/deploy.tar.gz -C /home/ubuntu/usbdevicecontrol
            cd /home/ubuntu/usbdevicecontrol
            if ! command -v docker-compose >/dev/null 2>&1; then
              echo "docker-compose not found, installing..."
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi
            if command -v docker-compose >/dev/null 2>&1; then
              DC=docker-compose
            else
              DC="docker compose"
            fi
            $DC down || true
            $DC up -d --build
            echo "Deployment completed successfully!"
