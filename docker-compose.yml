version: "3.8"
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app-network

  backend:
    build: ./backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app/backend
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - app-network
      
  frontend:
    build: ./frontend
    command: npm run dev -- --hostname 0.0.0.0
    working_dir: /app
    volumes:
      - ./frontend:/app
    expose:
      - "3000"
    env_file:
      - ./frontend/.env.local
    networks:
      - app-network
      
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: usb_control
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
